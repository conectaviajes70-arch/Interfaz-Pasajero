<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conecta Usuario</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #05070d;
  color: white;
}

#map {
  width: 100%;
  height: 50vh;
}

.panel {
  height: 50vh;
  background: rgba(15,15,25,0.95);
  border-radius: 25px 25px 0 0;
  padding: 20px;
  box-shadow: 0 -5px 25px #00cfff;
  position: relative;
  z-index: 10;
}

.tarifa {
  margin-top: 15px;
  text-align: center;
  font-size: 26px;
  color: #00cfff;
  font-weight: bold;
}

.mapboxgl-ctrl-geocoder {
  width: 100%;
  margin-bottom: 15px;
  border-radius: 15px;
  background: rgba(20,20,30,0.8);
  box-shadow: 0 0 10px #00cfff inset;
  z-index: 9999 !important;
}

.mapboxgl-ctrl-geocoder--suggestion {
  z-index: 9999 !important;
  background: #0f172a !important;
  color: white;
}

.mapboxgl-ctrl-geocoder--suggestions {
  z-index: 9999 !important;
}

/* TEXTO DENTRO DE INPUTS */
.mapboxgl-ctrl-geocoder input {
  color: #ffffff !important;
  background: transparent !important;
}

/* TEXTO DEL AUTOCOMPLETADO */
.mapboxgl-ctrl-geocoder--suggestion {
  color: #ffffff !important;
}

/* TEXTO SECUNDARIO (direcciones pequeñas) */
.mapboxgl-ctrl-geocoder--suggestion-address {
  color: #8ec3ff !important;
}

/* PLACEHOLDER */
.mapboxgl-ctrl-geocoder input::placeholder {
  color: #8ec3ff !important;
}  
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<button onclick="usarMiUbicacion()" style="width:100%;padding:12px;margin-bottom:10px;border-radius:10px;background:#00cfff;border:none;">
📍 Usar mi ubicación
</button>

<div id="geocoderOrigen"></div>
<div id="geocoderDestino"></div>

<button onclick="cotizarViaje()" style="width:100%;padding:14px;border-radius:12px;background:#00ff9f;border:none;font-weight:bold;">
 Cotizar viaje
</button>

<div class="tarifa" id="resultado"></div>

</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiMzkxODM2IiwiYSI6ImNtbXl4dWZoNzAyamwycm9pZHBoYjNpNzEifQ.ryQd-8yPv1gX6BkNsToW_A';

// MAPA
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/navigation-night-v1',
  center: [-99.1332, 19.4326],
  zoom: 12
});

// VARIABLES
let origenCoords = null;
let destinoCoords = null;
let marcadorA, marcadorB;

// UBICACIÓN INICIAL MÁS RÁPIDA
navigator.geolocation.getCurrentPosition(
  pos => {
    map.flyTo({
      center: [pos.coords.longitude, pos.coords.latitude],
      zoom: 14
    });
  },
  () => {},
  { enableHighAccuracy: true, timeout: 5000, maximumAge: 60000 }
);

// GEOCODER
function crearGeocoder(placeholder) {
  return new MapboxGeocoder({
    accessToken: mapboxgl.accessToken,
    placeholder,
    mapboxgl,
    marker: false,
    countries: "mx",
    language: "es",
    limit: 5
  });
}

const geocoderOrigen = crearGeocoder("¿Dónde estás?");
const geocoderDestino = crearGeocoder("¿A dónde vas?");

document.getElementById("geocoderOrigen").appendChild(geocoderOrigen.onAdd(map));
document.getElementById("geocoderDestino").appendChild(geocoderDestino.onAdd(map));

// EVENTOS (YA NO CALCULA AUTOMÁTICO)
geocoderOrigen.on("result", e => {
  origenCoords = e.result.center;
});

geocoderDestino.on("result", e => {
  destinoCoords = e.result.center;
});

// BOTÓN COTIZAR (CONTROL TOTAL 💸)
async function cotizarViaje() {
  if (!origenCoords || !destinoCoords) {
    alert("Selecciona origen y destino");
    return;
  }

  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${origenCoords[0]},${origenCoords[1]};${destinoCoords[0]},${destinoCoords[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;

  const res = await fetch(url);
  const data = await res.json();
  const ruta = data.routes[0];

  const distanciaKm = ruta.distance / 1000;
  const duracionMin = ruta.duration / 60;

  let tarifa = Math.round(25 + (distanciaKm * 7) + (duracionMin * 2.5));

  document.getElementById("resultado").innerHTML = `
  ⏱ ${Math.round(duracionMin)} min<br>
   $${tarifa}
  <br><br>
  <button onclick="confirmarViaje()">Confirmar</button>
  <button onclick="cancelarViaje()">Cancelar</button>
  `;

  // MARCADORES
  if (marcadorA) marcadorA.remove();
  if (marcadorB) marcadorB.remove();

  marcadorA = new mapboxgl.Marker().setLngLat(origenCoords).addTo(map);
  marcadorB = new mapboxgl.Marker({ color: "red" }).setLngLat(destinoCoords).addTo(map);
}

// UBICACIÓN MEJORADA 🔥
function usarMiUbicacion() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lng = pos.coords.longitude;
      const lat = pos.coords.latitude;

      origenCoords = [lng, lat];

      map.flyTo({ center: [lng, lat], zoom: 15 });

      geocoderOrigen.setInput("Mi ubicación 📍");
    },
    err => {
      alert("No se pudo obtener ubicación");
    },
    {
      enableHighAccuracy: true,
      timeout: 5000,
      maximumAge: 60000
    }
  );
}

function confirmarViaje() {
  alert("Viaje confirmado 🚗");
}

function cancelarViaje() {
  document.getElementById("resultado").innerHTML = "";
}
</script>

</body>
</html>
