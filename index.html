<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conecta Usuario</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #05070d;
  color: white;
}

#map {
  width: 100%;
  height: 50vh;
}

.panel {
  height: 50vh;
  background: rgba(15,15,25,0.95);
  border-radius: 25px 25px 0 0;
  padding: 20px;
  box-shadow: 0 -5px 25px #00cfff;
}

.tarifa {
  margin-top: 15px;
  text-align: center;
  font-size: 26px;
  color: #00cfff;
  font-weight: bold;
}

.mapboxgl-ctrl-geocoder {
  width: 100%;
  margin-bottom: 15px;
  border-radius: 15px;
  background: rgba(20,20,30,0.8);
  box-shadow: 0 0 10px #00cfff inset;
}

.mapboxgl-ctrl-geocoder input {
  color: #ffffff !important;
  background: transparent;
}

.mapboxgl-ctrl-geocoder input::placeholder {
  color: #8ec3ff !important;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<button onclick="usarMiUbicacion()" style="width:100%;padding:12px;margin-bottom:10px;border-radius:10px;background:#00cfff;border:none;">
📍 Usar mi ubicación
</button>

<div id="geocoderOrigen"></div>
<div id="geocoderDestino"></div>

<div class="tarifa" id="resultado"></div>

</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>

<script>
mapboxgl.accessToken = 'TU_TOKEN_AQUI';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/navigation-night-v1',
  center: [-99.1332, 19.4326],
  zoom: 12
});

// VARIABLES
let origenCoords = null;
let destinoCoords = null;
let marcadorA, marcadorB;

// UBICACIÓN AUTOMÁTICA
navigator.geolocation.getCurrentPosition(pos => {
  const lng = pos.coords.longitude;
  const lat = pos.coords.latitude;

  map.flyTo({ center: [lng, lat], zoom: 14 });
});

// GEOCODERS
const geocoderOrigen = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  placeholder: "¿Dónde estás?",
  mapboxgl,
  marker: false,
  countries: "mx",
  proximity: { longitude: -99.1332, latitude: 19.4326 }
});

const geocoderDestino = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  placeholder: "¿A dónde vas?",
  mapboxgl,
  marker: false,
  countries: "mx",
  proximity: { longitude: -99.1332, latitude: 19.4326 }
});

document.getElementById("geocoderOrigen").appendChild(geocoderOrigen.onAdd(map));
document.getElementById("geocoderDestino").appendChild(geocoderDestino.onAdd(map));

// EVENTOS
geocoderOrigen.on("result", e => {
  origenCoords = e.result.center;
  calcularRuta();
});

geocoderDestino.on("result", e => {
  destinoCoords = e.result.center;
  calcularRuta();
});

// FUNCIÓN RUTA
async function calcularRuta() {
  if (!origenCoords || !destinoCoords) return;

  if (marcadorA) marcadorA.remove();
  if (marcadorB) marcadorB.remove();

  const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${origenCoords[0]},${origenCoords[1]};${destinoCoords[0]},${destinoCoords[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;

  const res = await fetch(url);
  const data = await res.json();

  const ruta = data.routes[0];

  const distanciaKm = ruta.distance / 1000;
  const duracionMin = ruta.duration / 60;

  // TARIFA REAL
  let tarifa = Math.round(
    25 + (distanciaKm * 7) + (duracionMin * 2.5)
  );

  document.getElementById("resultado").innerHTML = `
  ⏱ ${Math.round(duracionMin)} min<br>
  💰 $${tarifa}
  <br><br>
  <button onclick="confirmarViaje()" style="background:#00cfff;border:none;padding:12px 20px;border-radius:10px;margin-right:10px;">Confirmar</button>
  <button onclick="cancelarViaje()" style="background:#ff3b3b;border:none;padding:12px 20px;border-radius:10px;">Rechazar</button>
  `;

  // MARCADORES
  marcadorA = new mapboxgl.Marker({ color: "#00ff9f" })
    .setLngLat(origenCoords)
    .addTo(map);

  marcadorB = new mapboxgl.Marker({ color: "#ff3b3b" })
    .setLngLat(destinoCoords)
    .addTo(map);

  // RUTA
  if (map.getSource("ruta")) {
    map.getSource("ruta").setData(ruta.geometry);
  } else {
    map.addSource("ruta", {
      type: "geojson",
      data: ruta.geometry
    });

    map.addLayer({
      id: "ruta",
      type: "line",
      source: "ruta",
      paint: {
        "line-color": "#00cfff",
        "line-width": 5
      }
    });
  }

  const bounds = new mapboxgl.LngLatBounds();
  bounds.extend(origenCoords);
  bounds.extend(destinoCoords);
  map.fitBounds(bounds, { padding: 50 });
}

// BOTONES
function confirmarViaje() {
  alert("Viaje confirmado 🚗");
}

function cancelarViaje() {
  document.getElementById("resultado").innerHTML = "";
}

// BOTÓN UBICACIÓN (ARREGLADO 🔥)
function usarMiUbicacion() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lng = pos.coords.longitude;
    const lat = pos.coords.latitude;

    origenCoords = [lng, lat];

    map.flyTo({ center: [lng, lat], zoom: 15 });

    // 👉 ESTO ES LO QUE FALTABA
    geocoderOrigen.setInput("Tu ubicación actual");

    calcularRuta();
  });
}
</script>

</body>
</html>
