<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conecta Usuario</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #05070d;
  color: white;
}

#map {
  width: 100%;
  height: 50vh;
}

.panel {
  height: 50vh;
  background: rgba(15,15,25,0.95);
  border-top-left-radius: 25px;
  border-top-right-radius: 25px;
  padding: 20px;
  box-shadow: 0 -5px 25px #00cfff;
}

.btn {
  width: 100%;
  padding: 18px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #00cfff, #0066ff);
  color: white;
  font-size: 18px;
  box-shadow: 0 0 20px #00cfff;
}

.tarifa {
  margin-top: 15px;
  text-align: center;
  font-size: 20px;
  color: #00cfff;
}

.mapboxgl-ctrl-geocoder {
  width: 100%;
  margin-bottom: 15px;
  border-radius: 15px;
  background: rgba(20,20,30,0.8);
  box-shadow: 0 0 10px #00cfff inset;
}

.mapboxgl-ctrl-geocoder input {
  color: white;
  background: transparent;
}

  .mapboxgl-ctrl-geocoder input {
  color: #ffffff !important;
}

.mapboxgl-ctrl-geocoder input::placeholder {
  color: #8ec3ff !important;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <div id="geocoderOrigen"></div>
  <div id="geocoderDestino"></div>

  <button class="btn" onclick="cotizar()">Calcular viaje</button>

  <div class="tarifa" id="resultado"></div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiMzkxODM2IiwiYSI6ImNtbXl4dWZoNzAyamwycm9pZHBoYjNpNzEifQ.ryQd-8yPv1gX6BkNsToW_A';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/navigation-night-v1',
  center: [-99.1332, 19.4326],
  zoom: 12
});

// VARIABLES PARA GUARDAR DATOS
let origenCoords = null;
let destinoCoords = null;

// GEOCODER ORIGEN
const geocoderOrigen = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  placeholder: "¿Dónde estás?",
  mapboxgl: mapboxgl,
  marker: false
});

// GEOCODER DESTINO
const geocoderDestino = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  placeholder: "¿A dónde vas?",
  mapboxgl: mapboxgl,
  marker: false
});

// INSERTAR
document.getElementById("geocoderOrigen").appendChild(geocoderOrigen.onAdd(map));
document.getElementById("geocoderDestino").appendChild(geocoderDestino.onAdd(map));

// GUARDAR UBICACIONES
geocoderOrigen.on('result', e => {
  origenCoords = e.result.center;
});

geocoderDestino.on('result', e => {
  destinoCoords = e.result.center;
});

// FUNCIÓN COTIZAR
function cotizar() {

  if (!origenCoords || !destinoCoords) {
    alert("Selecciona origen y destino");
    return;
  }

  // cálculo simple por ahora
  let precio = Math.floor(Math.random() * 100) + 50;

  document.getElementById("resultado").innerText =
    "Tarifa estimada: $" + precio;
}
</script>

</body>
</html>
